services:
  postgres:
    image: postgres:16-alpine
    container_name: billbo-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: billbo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.deploy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d billbo']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [billbo]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: billbo-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/billbo?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env.deploy}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env.deploy}
    expose:
      - '4000'
    networks: [billbo]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY:-}
    container_name: billbo-frontend-prod
    restart: unless-stopped
    expose:
      - '80'
    networks: [billbo]

  caddy:
    image: caddy:2-alpine
    container_name: billbo-caddy-prod
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [billbo]

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  billbo:
    name: billbo_prod
